<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>My Portfolio</title>
 <style>
 body {
 font-family: 'Arial', sans-serif;
 margin: 0;
 padding: 0;
 background-color: #f0f0f0;
 color: #333;
 }

 .container {
 max-width: 1200px;
 margin: 0 auto;
 padding: 20px;
 }

 header {
 background-color: #2c3e50;
 color: white;
 padding: 20px;
 text-align: center;
 }

 h1 {
 animation: fadeIn 2s;
 }

 .section {
 background-color: white;
 padding: 30px;
 margin: 20px 0;
 border-radius: 10px;
 box-shadow: 0 0 10px rgba(0,0,0,0.1);
 }

 .section h2 {
 color: #2c3e50;
 border-bottom: 2px solid #2c3e50;
 padding-bottom: 10px;
 }

 .btn {
 background-color: #3498db;
 color: white;
 padding: 10px 20px;
 border: none;
 border-radius: 5px;
 cursor: pointer;
 animation: pulse 2s infinite;
 }

 @keyframes fadeIn {
 from { opacity: 0; }
 to { opacity: 1; }
 }

 @keyframes pulse {
 0% { transform: scale(1); }
 50% { transform: scale(1.05); }
 100% { transform: scale(1); }
 }
 </style>
</head>
<body>
 <header>
 <h1>John Doe</h1>
 <p>Web Developer & Designer</p>
 </header>

 <div class="container">
 <section class="section">
 <h2>About Me</h2>
 <p>Hello! I'm John, a passionate web developer with a knack for creating beautiful and functional websites.</p>
 </section>

 <section class="section">
 <h2>My Work</h2>
 <p>Here are some of my recent projects:</p>
 <ul>
 <li>Project 1</li>
 <li>Project 2</li>
 <li>Project 3</li>
 </ul>
 </section>

 <section class="section">
 <h2>Contact Me</h2>
 <p>Feel free to reach out!</p>
 <button class="btn">Email Me</button>
 </section>
 </div>
</body>
</html>
