# ============================================================
#  configs/dpo_qwen14b_q4.yaml
#  Maria — Direct Preference Optimization (DPO) Config
#  Step 2 of 4 in the thesis pipeline:
#    Base model → SFT → [DPO] → Merge → GGUF → Ollama
# ============================================================
#
#  What is DPO?
#  DPO teaches the model to prefer "chosen" responses over "rejected"
#  ones, using the DPO preference pairs Maria already collects
#  (maria_dpo_dataset.jsonl). It's more stable than RLHF and needs
#  no separate reward model.
#
#  IMPORTANT: Run train_sft.py FIRST. This config points at the SFT
#  output as the base model. Training DPO on the raw base model
#  (without SFT) usually gives worse results.
# ============================================================

# ── Model ────────────────────────────────────────────────────
model:
  name: "./sft_checkpoints/merged_bf16"   # ← SFT output (run SFT first!)
  quantization: "q4_k_m"
  use_unsloth: true
  load_in_4bit: true

# ── LoRA ─────────────────────────────────────────────────────
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

# ── Dataset ──────────────────────────────────────────────────
data:
  train_file: "maria_dpo_dataset.jsonl"   # Preference pairs (chosen vs rejected)
  format: "dpo_chatml"                    # prompt + chosen + rejected triplets
  max_seq_length: 2048
  max_prompt_length: 1024                 # Prompt portion of the context

# ── DPO-specific ─────────────────────────────────────────────
dpo:
  beta: 0.1           # Controls how strongly we enforce the preference.
                      # 0.1 = standard. Lower → more conservative. Higher → more aggressive.
  loss_type: "sigmoid"   # "sigmoid" is the standard DPO loss
  label_smoothing: 0.0   # 0.0 = hard preferences; try 0.1 if training is unstable
  reference_model: "auto"   # Use the SFT model as the frozen reference policy

# ── Training hyperparameters ─────────────────────────────────
training:
  output_dir: "./dpo_checkpoints"
  num_epochs: 1                # DPO usually only needs 1 epoch to avoid over-optimising
  per_device_batch_size: 1     # DPO needs chosen + rejected per step → uses 2× memory
  gradient_accumulation: 16    # Effective batch = 16
  learning_rate: 5.0e-5        # Lower LR than SFT — we don't want to drift too far
  lr_scheduler: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  fp16: false
  bf16: true
  gradient_checkpointing: true
  logging_steps: 10
  eval_steps: 50
  save_steps: 100
  load_best_model_at_end: true

# ── Merge & Export ───────────────────────────────────────────
export:
  merge_to_bf16: true
  merged_output: "./dpo_checkpoints/merged_bf16"
  # Convert to GGUF:
  #   python llama.cpp/convert-hf-to-gguf.py ./dpo_checkpoints/merged_bf16 --outtype q5_k_m
  #   ollama create maria-v2 -f Modelfile

# ── Reproducibility ──────────────────────────────────────────
seed: 42
run_name: "maria_dpo_qwen14b_q4"
report_to: "none"